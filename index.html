<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>การพิจารณาบุคคลดีเด่น ยก.ทหาร ประจำปี 69</title>
  <style>
    body {
      font-family: 'Sarabun', 'Leelawadee UI', sans-serif;
      max-width: 720px;
      margin: 40px auto;
      padding: 0 16px;
      color: #222;
    }
    h2 { text-align: center; margin-bottom: 4px; }
    .subtitle { text-align: center; color: #666; margin-bottom: 28px; font-size: 14px; }
    label { font-weight: bold; display: block; margin-bottom: 6px; }
    select {
      width: 100%;
      padding: 10px;
      font-size: 15px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }
    #scoreSection { display: none; margin-top: 28px; }
    .hint { color: #888; font-size: 13px; margin-bottom: 16px; }
    .candidate-card {
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 18px;
    }
    .candidate-name {
      font-weight: bold;
      font-size: 16px;
      margin-bottom: 10px;
      color: #4a148c;
    }
    table.rating-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    table.rating-table th {
      font-weight: normal;
      color: #666;
      padding: 4px 2px;
      text-align: center;
      width: 15%;
    }
    table.rating-table th:first-child { text-align: left; width: 25%; }
    table.rating-table td {
      text-align: center;
      padding: 6px 2px;
      border-top: 1px solid #f0f0f0;
    }
    table.rating-table td:first-child { text-align: left; font-size: 14px; }
    input[type=radio] { width: 18px; height: 18px; cursor: pointer; }
    button {
      background: #673ab7;
      color: white;
      border: none;
      padding: 12px 28px;
      border-radius: 6px;
      font-size: 15px;
      cursor: pointer;
      margin-top: 8px;
      width: 100%;
    }
    button:disabled { background: #ccc; cursor: not-allowed; }
    #successMsg, #loadErrorMsg {
      display: none;
      text-align: center;
      font-weight: bold;
      font-size: 16px;
      margin-top: 40px;
    }
    #successMsg { color: #2e7d32; }
    #loadErrorMsg { color: #c62828; }
    #loadingMsg { text-align: center; color: #888; margin-top: 40px; }
  </style>
</head>
<body>
  <h2>การพิจารณาบุคคลดีเด่น ยก.ทหาร ประจำปี 69</h2>
  <div class="subtitle">สัญญาบัตร</div>

  <div id="loadingMsg">กำลังโหลดข้อมูล...</div>
  <div id="loadErrorMsg">ไม่สามารถโหลดข้อมูลได้ กรุณาลองรีเฟรชหน้าใหม่</div>

  <div id="step1" style="display:none;">
    <label>เลือกชื่อของท่าน (ผู้พิจารณา) *</label>
    <select id="evaluatorSelect" onchange="loadScoreList()">
      <option value="">-- กรุณาเลือก --</option>
    </select>
  </div>

  <div id="scoreSection">
    <p class="hint">โปรดประเมินบุคคลต่อไปนี้ในแต่ละด้าน (เลือกได้ 1 ระดับต่อด้าน)</p>
    <div id="scoreList"></div>
    <button onclick="submitForm()" id="submitBtn">ส่งคำตอบ</button>
  </div>

  <div id="successMsg">✓ ส่งคำตอบเรียบร้อยแล้ว ขอบคุณครับ/ค่ะ</div>

  <script>
    // ==== ตั้งค่า: ใส่ URL ของ Apps Script Web App ที่ deploy แล้ว (ลงท้ายด้วย /exec) ====
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyOBdrl-1ohh75my4GvruSTD2El9Mm2rEbLZyRm6We9JZqStYAIc4QmDBc_dojrWH5DMw/exec';

    let allNames = [];
    let criteria = [];
    let likertLabels = [];

    async function init() {
      try {
        const res = await fetch(SCRIPT_URL + '?action=getFormConfig');
        const config = await res.json();
        if (config.error) throw new Error(config.error);

        allNames = config.names;
        criteria = config.criteria;
        likertLabels = config.likertLabels;

        const sel = document.getElementById('evaluatorSelect');
        config.availableEvaluators.forEach(function (n) {
          const opt = document.createElement('option');
          opt.value = n;
          opt.textContent = n;
          sel.appendChild(opt);
        });

        document.getElementById('loadingMsg').style.display = 'none';
        document.getElementById('step1').style.display = 'block';

        if (config.availableEvaluators.length === 0) {
          document.getElementById('step1').innerHTML =
            '<p style="text-align:center;color:#c62828;font-weight:bold;">ทุกท่านได้ส่งคะแนนครบถ้วนแล้ว ขอบคุณครับ/ค่ะ</p>';
        }
      } catch (err) {
        document.getElementById('loadingMsg').style.display = 'none';
        document.getElementById('loadErrorMsg').style.display = 'block';
        console.error(err);
      }
    }

    function loadScoreList() {
      const evaluator = document.getElementById('evaluatorSelect').value;
      const listDiv = document.getElementById('scoreList');
      listDiv.innerHTML = '';

      if (!evaluator) {
        document.getElementById('scoreSection').style.display = 'none';
        return;
      }

      // ตัดชื่อผู้พิจารณาออกจากรายชื่อที่ต้องประเมิน (ไม่ให้คะแนนตัวเอง)
      const candidates = allNames.filter(function (n) { return n !== evaluator; });

      candidates.forEach(function (name) {
        const card = document.createElement('div');
        card.className = 'candidate-card';

        let headerCells = '<th></th>';
        likertLabels.forEach(function (label) {
          headerCells += '<th>' + label + '</th>';
        });

        let bodyRows = '';
        criteria.forEach(function (criterion) {
          const groupName = safeId(name) + '__' + safeId(criterion);
          let cells = '<td>' + criterion + '</td>';
          for (let score = 5; score >= 1; score--) {
            cells += '<td><input type="radio" name="' + groupName + '" value="' + score + '" required></td>';
          }
          bodyRows += '<tr>' + cells + '</tr>';
        });

        card.innerHTML =
          '<div class="candidate-name">' + name + '</div>' +
          '<table class="rating-table" data-candidate="' + name + '">' +
          '<thead><tr>' + headerCells + '</tr></thead>' +
          '<tbody>' + bodyRows + '</tbody>' +
          '</table>';

        listDiv.appendChild(card);
      });

      document.getElementById('scoreSection').style.display = 'block';
    }

    function safeId(text) {
      return text.replace(/[^a-zA-Z0-9ก-๙]/g, '_');
    }

    async function submitForm() {
      const evaluator = document.getElementById('evaluatorSelect').value;
      if (!evaluator) {
        alert('กรุณาเลือกชื่อของท่านก่อน');
        return;
      }

      const tables = document.querySelectorAll('table.rating-table');
      const scores = [];
      let valid = true;

      tables.forEach(function (table) {
        const candidateName = table.getAttribute('data-candidate');
        const ratings = {};

        criteria.forEach(function (criterion) {
          const groupName = safeId(candidateName) + '__' + safeId(criterion);
          const checked = table.querySelector('input[name="' + groupName + '"]:checked');
          if (!checked) {
            valid = false;
            ratings[criterion] = null;
          } else {
            ratings[criterion] = parseInt(checked.value, 10);
          }
        });

        scores.push({ name: candidateName, ratings: ratings });
      });

      if (!valid) {
        alert('กรุณาประเมินให้ครบทุกด้านของทุกคน');
        return;
      }

      const submitBtn = document.getElementById('submitBtn');
      submitBtn.disabled = true;
      submitBtn.textContent = 'กำลังส่ง...';

      try {
        // ใช้ Content-Type: text/plain โดยตั้งใจ เพื่อเลี่ยง CORS preflight (Apps Script ไม่รองรับ OPTIONS)
        const res = await fetch(SCRIPT_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify({
            action: 'submitScores',
            evaluatorName: evaluator,
            scores: scores
          })
        });
        const result = await res.json();

        if (result.error) throw new Error(result.error);

        document.getElementById('step1').style.display = 'none';
        document.getElementById('scoreSection').style.display = 'none';
        document.getElementById('successMsg').style.display = 'block';
      } catch (err) {
        alert('เกิดข้อผิดพลาด: ' + err.message);
        submitBtn.disabled = false;
        submitBtn.textContent = 'ส่งคำตอบ';
      }
    }

    init();
  </script>
</body>
</html>
